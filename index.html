<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T-Shirt Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>My T-Shirt Store</h1>
    <p>Premium quality streetwear</p>
  </header>

  <section class="products">

    <div class="card">
      <img src="https://via.placeholder.com/300" />
      <h2>Black Oversize T-Shirt</h2>
      <p>Price: 2000 DA</p>
      <button onclick="addToCart('Black Oversize T-Shirt', 2000)">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300" />
      <h2>White Minimal Tee</h2>
      <p>Price: 1800 DA</p>
      <button onclick="addToCart('White Minimal Tee', 1800)">Add to Cart</button>
    </div>

  </section>

  <section class="cart">
    <h2>Cart</h2>
    <ul id="cart-items"></ul>
    <p id="total">Total: 0 DA</p>
  </section>

  <section class="checkout">
    <h2>Checkout</h2>

    <input id="name" placeholder="Full Name">
    <input id="phone" placeholder="Phone">
    <input id="address" placeholder="Address">

    <button onclick="submitOrder()">Place Order</button>
  </section>

  <script src="script.js"></script>

</body>
</html>
